<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>بحث عن الآية</title>
<style>
body{font-family:'Amiri',serif;background:#e3f2fd;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px}
.card{background:white;padding:30px;border-radius:20px;text-align:center;max-width:600px;width:100%}
h1{color:#1565c0}
textarea{width:95%;height:90px;font-size:22px;border:3px solid #64b5f6;border-radius:12px;text-align:center}
button{background:#1976d2;color:white;border:none;padding:14px 35px;font-size:20px;border-radius:12px;margin-top:15px}
#result{margin-top:25px;font-size:26px;color:#0d47a1;font-weight:bold}
#details{color:#2e7d32;font-size:18px;margin-top:12px;background:#e8f5e9;padding:10px;border-radius:8px}
</style>
</head>
<body>
<div class="card">
<h1>🔍 ابحث عن اسم السورة</h1>
<textarea id="ayahInput" placeholder="اكتبي: تبارك الذي، قل هو الله"></textarea><br>
<button onclick="searchAyah()">جيب لي اسم السورة</button>
<div id="result"></div><div id="details"></div>
</div>
<script>
const quranDB=[
{surah:"الملك",quarter:"سورة كاملة",ayahs:["تبارك الذي بيده الملك","الذي خلق الموت والحياة"]},
{surah:"الإخلاص",quarter:"سورة كاملة",ayahs:["قل هو الله أحد","الله الصمد"]},
{surah:"يس",quarter:"الربع 1-27",ayahs:["يس","والقرآن الحكيم","إنك لمن المرسلين"]}
];
function cleanText(t){return t.replace(/[ًٌٍَُِّْ~ٰٱإأآ]/g,'').trim()}
function searchAyah(){let input=cleanText(document.getElementById('ayahInput').value.trim());let r=document.getElementById('result');let d=document.getElementById('details');if(!input){r.innerText="اكتبي جزء من الآية أول";d.innerText="";return}for(let item of quranDB){for(let ayah of item.ayahs){if(cleanText(ayah).includes(input)){r.innerHTML="﴿ "+ayah+" ﴾";d.innerHTML="📖 سورة: <b>"+item.surah+"</b> | "+item.quarter;return}}}r.innerText="ما لقيتها 😔";d.innerText="جربي أول 3 كلمات"}
</script>
</body>
</html>
